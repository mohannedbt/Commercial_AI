services:
  # 1. FastAPI Backend (Docker-based Web Service)
  - type: web
    name: architect-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright

  # 2. React Frontend (Static Site)
  - type: web_static
    name: architect-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false